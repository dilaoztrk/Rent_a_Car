<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RentCar - Araçlar</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/araclar.css">
</head>
<body>
 
  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-logo">
      <img src="car-icon.svg" alt="logo">
      <span>RentCar</span>
    </div>
    <ul class="navbar-links">
      <li><a href="index.html">Ana Sayfa</a></li>
      <li><a href="araclar.html" class="active-link">Araçlar</a></li>
      <li><a href="index.html#hakkimizda">Hakkımızda</a></li>
      <li><a href="#">Hizmetler</a></li>
      <li><a href="index.html#iletisim">İletişim</a></li>
    </ul>
    <div class="navbar-buttons">
      <a href="login.html" class="btn-solid">Giriş / Kayıt</a>
    </div>
  </nav>
 
  <!-- ARAÇLAR SAYFASI -->
  <div class="araclar-layout">
 
    <!-- SOL FİLTRE PANELİ -->
    <aside class="filtre-panel">
      <div class="filtre-header">
        <h3>Filtrele</h3>
        <span>⚙️</span>
      </div>
 
      <div class="filtre-grup">
        <h4>Araç Tipi</h4>
        <label class="filtre-item">
          <input type="checkbox" value="" checked onchange="filtrele()"> Tümü
        </label>
        <label class="filtre-item">
          <input type="checkbox" value="Sedan" onchange="filtrele()"> Sedan
        </label>
        <label class="filtre-item">
          <input type="checkbox" value="SUV" onchange="filtrele()"> SUV
        </label>
        <label class="filtre-item">
          <input type="checkbox" value="Hatchback" onchange="filtrele()"> Hatchback
        </label>
        <label class="filtre-item">
          <input type="checkbox" value="Station Wagon" onchange="filtrele()"> Station Wagon
        </label>
        <label class="filtre-item">
          <input type="checkbox" value="Cabrio" onchange="filtrele()"> Cabrio
        </label>
        <label class="filtre-item">
          <input type="checkbox" value="Minivan" onchange="filtrele()"> Minivan
        </label>
      </div>
 
      <div class="filtre-grup">
        <h4>Yakıt Türü</h4>
        <label class="filtre-item">
          <input type="checkbox" value="Benzin" onchange="filtrele()"> Benzin
        </label>
        <label class="filtre-item">
          <input type="checkbox" value="Dizel" onchange="filtrele()"> Dizel
        </label>
        <label class="filtre-item">
          <input type="checkbox" value="Hibrit" onchange="filtrele()"> Hibrit
        </label>
        <label class="filtre-item">
          <input type="checkbox" value="Elektrik" onchange="filtrele()"> Elektrik
        </label>
        <label class="filtre-item">
          <input type="checkbox" value="LPG" onchange="filtrele()"> LPG
        </label>
      </div>
 
      <div class="filtre-grup">
        <h4>Vites Türü</h4>
        <label class="filtre-item">
          <input type="checkbox" value="Otomatik" onchange="filtrele()"> Otomatik
        </label>
        <label class="filtre-item">
          <input type="checkbox" value="Manuel" onchange="filtrele()"> Manuel
        </label>
      </div>
 
      <div class="filtre-grup">
        <h4>Fiyat Aralığı</h4>
        <div class="price-range">
          <span id="minFiyat">₺0</span>
          <span id="maxFiyat">₺10.000+</span>
        </div>
        <input type="range" id="maxFiyatRange" min="500" max="10000" step="100" value="10000" oninput="updateFiyat(this.value)">
      </div>
 
      <div class="filtre-grup">
        <h4>Yıl Aralığı</h4>
        <div class="yil-range">
          <select id="minYil" onchange="filtrele()">
            <option value="">Min Yıl</option>
            <option>2018</option><option>2019</option><option>2020</option>
            <option>2021</option><option>2022</option><option>2023</option><option>2024</option>
          </select>
          <select id="maxYil" onchange="filtrele()">
            <option value="">Max Yıl</option>
            <option>2018</option><option>2019</option><option>2020</option>
            <option>2021</option><option>2022</option><option>2023</option><option>2024</option>
          </select>
        </div>
      </div>
 
      <button class="btn-filtre-uygula" onclick="filtrele()">⚙️ Filtreleri Uygula</button>
      <button class="btn-filtre-temizle" onclick="temizleFiltre()">🔄 Temizle</button>
    </aside>
 
    <!-- SAĞ ARAÇ LİSTESİ -->
    <div class="arac-listesi">
      <div class="liste-header">
        <span id="aracSayisi">Yükleniyor...</span>
        <div class="siralama">
          <label>Sırala:</label>
          <select id="siralama" onchange="sirala()">
            <option value="onerilen">Önerilen</option>
            <option value="fiyat-asc">Fiyat (Düşük → Yüksek)</option>
            <option value="fiyat-desc">Fiyat (Yüksek → Düşük)</option>
            <option value="yil-desc">En Yeni</option>
          </select>
          <button class="view-btn active" onclick="setView('grid')">▦</button>
          <button class="view-btn" onclick="setView('list')">☰</button>
        </div>
      </div>
 
      <div class="arac-grid" id="aracGrid">
        <div class="yukleniyor">Araçlar yükleniyor...</div>
      </div>
 
      <div class="pagination" id="pagination"></div>
    </div>
 
  </div>
 
  <script src="js/araclar.js"></script>
</body>
</html>
