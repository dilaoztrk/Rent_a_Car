<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <title>RentCar</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <header class="navbar">
      <div class="logo">🚗 RentCar</div>

      <nav class="nav-links">
        <a href="index.html">Ana Sayfa</a>
        <a href="#">Araçlar</a>
        <a href="about.html">Hakkımızda</a>
        <a href="#contact">İletişim</a>
      </nav>

      <button class="login-btn" onclick="window.location.href = 'landing.html'">
        Giriş Yap
      </button>
    </header>
    <!-- FILTER BAR -->
    <section class="filter-bar">
      <input
        id="searchInput"
        type="text"
        placeholder="Araç marka veya model ara..."
      />
      <select id="fuelFilter">
        <option value="">Yakıt Tipi</option>
        <option value="Benzin">Benzin</option>
        <option value="Dizel">Dizel</option>
      </select>

      <select id="gearFilter">
        <option value="">Vites Tipi</option>
        <option value="Otomatik">Otomatik</option>
        <option value="Manuel">Manuel</option>
      </select>

      <button id="filterBtn" class="filter-btn">Filtrele</button>
    </section>
    <!-- VEHICLE LIST -->
    <section class="vehicle-list"></section>
    <script src="js/app.js"></script>
    <footer id="contact" class="footer">
      <div class="footer-content">
        <h3>İletişim</h3>
        <p>📍 İstanbul, Türkiye</p>
        <p>📞 +90 555 555 55 55</p>
        <p>✉️ info@rentcar.com</p>
      </div>
    </footer>
  </body>
</html>
