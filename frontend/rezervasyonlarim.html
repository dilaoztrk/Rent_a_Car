<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Rezervasyonlarım</title>

    <style>

        body{
            font-family:Arial;
            background:#0a0a0a;
            color:white;
            padding:40px;
        }

        .kart{
            background:#1a1a2e;
            padding:24px;
            border-radius:16px;
            margin-bottom:20px;
        }

        img{
            width:100%;
            max-width:300px;
            border-radius:12px;
            margin-bottom:16px;
        }

    </style>
</head>
<body>

<h1>Rezervasyonlarım</h1>

<div id="rezervasyonlar"></div>

<script>

async function rezervasyonlariGetir() {

    const userId = 1;
    const response = await fetch(
        `http://localhost:8080/api/reservations/customer/${userId}`
    );

    const data = await response.json();

    const container =
        document.getElementById("rezervasyonlar");

    container.innerHTML = "";

    data.forEach(r => {

        container.innerHTML += `

            <div class="kart">

                <img src="http://127.0.0.1:5500/${r.vehicle.imageUrl}">

                <h2>${r.vehicle.plateNo}</h2>

                <p>Başlangıç:
                ${r.startDate}</p>

                <p>Bitiş:
                ${r.endDate}</p>

                <p>Toplam:
                ₺${r.totalAmount}</p>

            </div>

        `;
    });
}

rezervasyonlariGetir();

</script>

</body>
</html>
